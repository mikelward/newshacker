<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6600" />
    <title>newshacker — a reader for Hacker News</title>
    <meta name="description" content="A mobile-friendly, unofficial reader for Hacker News." />
    <script>
      // Apply a stored theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('newshacker:theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
