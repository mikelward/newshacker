<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Match the in-app header bg (`--nh-bg` in global.css) so the
         mobile browser URL-bar tint and the sticky app header paint
         the same color. The `content` is seeded by the boot script
         below and kept in sync by `applyTheme` / `useTheme`. We
         can't use `media="(prefers-color-scheme: …)"` because the
         app supports an explicit light/dark override (the drawer's
         Mode picker) that must take precedence over the OS
         preference. `content` starts at the light value so the
         pre-JS paint is correct for the majority case. -->
    <meta name="theme-color" content="#f6f6ef" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="newshacker" />
    <title>newshacker — a reader for Hacker News</title>
    <meta name="description" content="A mobile-friendly, unofficial reader for Hacker News." />
    <!-- Open Graph / Twitter Card defaults. Crawlers don't execute the
         SPA's JS, so per-route previews can't come from React. For
         /item/:id we route bot user-agents to /api/og (see vercel.json)
         which renders item-specific tags (title, age). Everything else
         falls back to these defaults. og:image is the static brand
         icon paired with twitter:card="summary" (small square card).
         We point it at the 256px icon, not the 512px one: WhatsApp
         ignores twitter:card entirely and picks its layout from the
         image's pixel size — a 512² square trips its "big enough for a
         hero banner" threshold and fills a giant box, whereas a sub-300px
         image falls back to the compact left-thumbnail card we actually
         want. 256 is the sweet spot: at/above Facebook's documented
         200×200 minimum (so Messenger/Facebook don't drop the thumbnail)
         yet still under WhatsApp's ~300px large-card threshold. Platforms
         that honor twitter:card (iMessage, Slack, …) get a crisp square
         thumbnail either way.
         TODO: consider rendering the linked article's hero image for
         /item/:id previews (see api/og.ts) instead of the brand icon. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="newshacker" />
    <meta property="og:title" content="newshacker — a reader for Hacker News" />
    <meta property="og:description" content="A mobile-friendly, unofficial reader for Hacker News." />
    <meta property="og:url" content="https://newshacker.app/" />
    <meta property="og:image" content="https://newshacker.app/icon-256.png" />
    <meta property="og:image:width" content="256" />
    <meta property="og:image:height" content="256" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="newshacker — a reader for Hacker News" />
    <meta name="twitter:description" content="A mobile-friendly, unofficial reader for Hacker News." />
    <meta name="twitter:image" content="https://newshacker.app/icon-256.png" />
    <script>
      // Apply stored mode + app-bar theme before first paint to avoid a
      // flash. The chrome whitelist is explicit (mono-a / mono-b) rather
      // than a regex so a corrupt or renamed-variant value in storage
      // falls back to the default chrome — if we let any `[a-z0-9-]+`
      // through, `:root[data-chrome]` CSS overrides would activate
      // without matching `--cp-*` tokens and break the header.
      (function () {
        try {
          var t = localStorage.getItem('newshacker:theme');
          var theme = t === 'dark' || t === 'light' ? t : 'system';
          if (theme !== 'system') {
            document.documentElement.setAttribute('data-theme', theme);
          }
          var c = localStorage.getItem('newshacker:chrome-preview');
          // Whitelist is explicit (not a regex) so a corrupt or
          // renamed-variant value in storage falls back to the mono
          // baseline. `mono` isn't in the list because it's the
          // baseline — no attribute needed.
          if (c === 'duo' || c === 'classic') {
            document.documentElement.setAttribute('data-chrome', c);
          }
          // Text size — explicit whitelist (medium is the 16px baseline, no
          // attribute) so a corrupt value falls back to medium rather than
          // activating a `:root[data-font-size]` override with no token.
          var fs = localStorage.getItem('newshacker:font-size');
          if (fs === 'small' || fs === 'large') {
            document.documentElement.setAttribute('data-font-size', fs);
          }
          // Seed the <meta name="theme-color"> from the *resolved* theme
          // (explicit override first, OS preference second). Keeping this
          // in lockstep with the inline boot avoids a visible flash of
          // the wrong browser-chrome color before React mounts. Values
          // mirror META_THEME_COLORS in src/lib/theme.ts.
          var resolved = theme;
          if (resolved === 'system') {
            resolved =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.content = resolved === 'dark' ? '#1b1b17' : '#f6f6ef';
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <!-- Stale-entry boot guard. Runs BEFORE the entry <script type="module">
         below (Vite injects that at the end of <head>), so it can catch the
         entry module *itself* failing to load — a module can't catch its own
         load failure, and if the entry fails nothing in React is alive to
         recover, leaving a blank page after a deploy that removed the hash
         this stale index.html still references. Capture-phase 'error' on a
         hashed-asset <script>/<link>, one guarded reload keyed on
         sessionStorage. Loop-safe: the entry module clears the key at its top
         (see clearEntryReloadBudget in src/lib/staleEntryRecovery.ts), so a
         permanently-broken entry never clears it and the single reload stands.
         Kept in sync by hand with that module (it can't import this inline). -->
    <script>
      (function () {
        var KEY = 'nh:entry-reload';
        function onError(e) {
          var t = e.target;
          if (!t || (t.tagName !== 'SCRIPT' && t.tagName !== 'LINK')) return;
          var url = t.src || t.href || '';
          if (url.indexOf('/assets/') === -1) return;
          try {
            if (sessionStorage.getItem(KEY)) return;
            sessionStorage.setItem(KEY, '1');
          } catch (_) {
            // No usable storage: fail closed. An un-recordable reload loops.
            return;
          }
          window.location.reload();
        }
        window.addEventListener('error', onError, true);
        // Let the entry module tear this down once it boots, so post-boot
        // chunk failures are owned solely by the module's own listeners (the
        // separate nh:chunk-reload budget) and never re-consume this one.
        window.__nhBootGuardOff = function () {
          window.removeEventListener('error', onError, true);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
