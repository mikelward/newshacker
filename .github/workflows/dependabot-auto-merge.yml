name: Dependabot auto-merge

# Auto-merge Dependabot PRs for minor and patch updates once CI is green.
# Major updates are held open for a human to review the changelog first.
#
# "when CI is green" is enforced by GitHub's native auto-merge (`gh pr merge
# --auto`): it queues the merge and only lands it after every required status
# check on the branch passes. This relies on the CI checks being marked
# required in branch protection for `main`; without that, auto-merge would
# land the PR without waiting. See CONTRIBUTING / repo settings.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Only act on PRs opened by Dependabot itself.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
