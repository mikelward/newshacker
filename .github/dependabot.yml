version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "msw"
          - "happy-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
