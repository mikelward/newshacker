<?xml version="1.0" encoding="UTF-8"?>
<!-- Notched "n" mark — orange tile with a small white speaker slot
     at the top edge and a white "n" centered below. The speaker slot
     is a subtle nod to a phone earpiece, since newshacker is mobile-
     first; at favicon scale the slot aliases toward invisibility and
     the mark reads as an "n" on an orange tile. Rasterized into
     public/icon-*.png via scripts/generate-icons.mjs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#ff6600"/>
  <rect x="216" y="112" width="80" height="12" rx="6" fill="#ffffff"/>
  <text x="256" y="312"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="320"
        fill="#ffffff">n</text>
</svg>
