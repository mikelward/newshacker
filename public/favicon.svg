<?xml version="1.0" encoding="UTF-8"?>
<!-- Rounded-square "keycap" tile with a white "ñ" centered on it.
     The tilde on the ñ nods at the language-quirk side of "hacker"
     while staying impossible to mistake for HN's Y logo. Rasterized
     into public/icon-*.png via scripts/generate-icons.mjs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#e65c00"/>
  <text x="256" y="256"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="320"
        fill="#ffffff">ñ</text>
</svg>
