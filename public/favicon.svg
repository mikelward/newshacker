<?xml version="1.0" encoding="UTF-8"?>
<!-- Keyboard-keycap mark. Orange tile + darker-orange keycap base
     (reads as the side of the cap) + white keycap top + black "n".
     Rasterized into public/icon-*.png via scripts/generate-icons.mjs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#ff6600"/>
  <rect x="76" y="96" width="360" height="340" rx="36" fill="#c94e00"/>
  <rect x="96" y="108" width="320" height="296" rx="28" fill="#ffffff"/>
  <text x="256" y="268"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-weight="700"
        font-size="240"
        fill="#1a1a1a">n</text>
</svg>
