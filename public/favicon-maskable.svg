<?xml version="1.0" encoding="UTF-8"?>
<!-- Android adaptive-icon / PWA maskable variant of public/favicon.svg.
     Differences from the non-maskable source:
      - Tile is full-bleed with no rounded corners: the OS launcher
        applies its own shape mask (circle, squircle, rounded square)
        and any transparent pixels it exposes would read as a chipped
        corner, so we keep the orange solid across the whole canvas.
      - Glyph and home-indicator pill are pulled inside the 80% safe
        zone (a circle of radius 205 px centered on 256, 256): the "n"
        is sized down to 256 and the pill to 128×10 at y=380, so the
        most aggressive launcher crops can't nibble them.
     Rasterized into public/icon-512-maskable.png by
     scripts/generate-icons.mjs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#e65100"/>
  <text x="256" y="240"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="256"
        fill="#ffffff">n</text>
  <rect x="192" y="380" width="128" height="10" rx="5" fill="#ffffff"/>
</svg>
